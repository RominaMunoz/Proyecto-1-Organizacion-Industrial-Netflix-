<head>
<!-- ====== CONFIGURACIÓN BÁSICA ====== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Hace que la página sea responsive (se adapta a celulares y pantallas pequeñas) -->
<title>Integración Vertical - Netflix</title><!-- Título que aparece en la pestaña del navegador -->
<style>
/* ====== ESTILO GENERAL ====== */
body {
    margin: 0; /* elimina márgenes por defecto */
    font-family: 'Inter', sans-serif; /* tipografía */
    background: radial-gradient(circle at top, #1a1a1a, #000);/* fondo degradado tipo Netflix */
    color: white; /* texto blanco */
    text-align: center; /* centra el contenido */
}
/* TÍTULO PRINCIPAL */
h1 {
    margin-top: 40px;
    font-size: 2.6em;
    font-weight: 800; /* más grueso */
}
/* ====== CONTENEDOR GENERAL ====== */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    max-width: 1000px;
    margin: 0 auto; /* centra todo el conjunto */
}
/* ====== ENGRANAJE ====== */
.gear-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 40px auto 20px auto; /* centrado real y balance vertical */
}
/* CÍRCULO PRINCIPAL */
.gear {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, #2a2a2a 40%, #111 41%);
    transition: transform 0.6s ease;
    box-shadow: 0 0 40px rgba(229,9,20,0.3);
    display: flex;
    justify-content: center;
    align-items: center; /* centra la N dentro del círculo *
}
/* DIENTES DEL ENGRANAJE */
.gear::before {
    content: "";
    position: absolute;
    width: 310px;
    height: 310px;
    top: -25px;
    left: -25px;
    background: repeating-conic-gradient(#444 0deg 12deg, #111 12deg 24deg);/* crea patrón circular tipo engranaje */
    border-radius: 50%;
    z-index: -1; /* queda detrás */
}
/* ====== LOGO NETFLIX ====== */
.netflix-logo {
    font-size: 5.5em;
    font-weight: 900;
    color: #E50914;
    line-height: 1;
}
/* ====== FLUJO (PRODUCCIÓN → DISTRIBUCIÓN) ====== */
.flow {
    .flow {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-top: 10px;
    opacity: 0.6;
}
.flow.active {
    opacity: 1; /* se ilumina cuando está activo */
}
/* ETAPAS */
.step {
    .step {
    padding: 10px 20px;
    border-radius: 20px;
    background: #222;
    font-size: 0.95em;
    min-width: 120px;
    text-align: center;
}
/* ====== SLIDER ====== */
.slider-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    width: 100%;
}
/* TEXTO DE LOS EXTREMOS */
.label {
    width: 120px;
    text-align: center;
}

input[type="range"] {
    width: 420px;
}
/* BARRA */
input[type="range"] {
    -webkit-appearance: none;
    width: 360px;
    height: 10px;
    background: linear-gradient(90deg, #444, #E50914, #444);
    border-radius: 20px;
}
/* BOTÓN DEL SLIDER */
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: #E50914;
    border-radius: 50%;
    cursor: pointer;
}
/* ====== TEXTO DINÁMICO ====== */
.text-box {
    max-width: 900px;
    margin-top: 30px;
    font-size: 1.1em;
    line-height: 1.7;
    text-align: justify; /* 🔥 texto justificado */
    letter-spacing: 0.3px;
    opacity: 0; /* oculto al inicio */
    transform: translateY(10px);
    transition: all 0.4s ease;
    
}
/* CUANDO APARECE */
.text-box.active {
    opacity: 1;
    transform: translateY(0);
}
/* LINKS INTERACTIVOS */
a {
    color: #4FC3F7;
    border-bottom: 1px dashed #4FC3F7;
    cursor: pointer;
}
/* ====== CUADRO PEQUEÑO ====== */
.tooltip {
    position: absolute;
    background: rgba(20,20,20,0.95);
    padding: 12px;
    border-radius: 10px;
    max-width: 280px;
    display: none;
    opacity: 0;
    transition: all 0.25s;
}
/* TRIÁNGULO DEL TOOLTIP */
.tooltip::after {
    content: "";
    position: absolute;
    top: -8px;
    left: 20px;
    border: 8px solid transparent;
    border-bottom-color: rgba(20,20,20,0.95);
}
/* CUANDO SE MUESTRA */
.tooltip.show {
    display: block;
    opacity: 1;
}
/* ICONOS */
.icon {
    font-size: 1.2em;
    margin-right: 5px;
}
</style>
</head>
<body>
<h1>Integración Vertical</h1>
<div class="container">

    <div class="gear-container">
        <div class="gear" id="gear">
            <div class="netflix-logo">N</div>
        </div>
    </div>

    <div class="flow" id="flow">
        <div class="step"> Producción</div>
        <div class="step"> Distribución</div>
    </div>

    <div class="slider-container">
        <div class="label">Hacia Atrás</div>
        <input type="range" min="0" max="2" step="1" value="1" id="slider">
        <div class="label">Hacia Adelante </div>
    </div>

    <div class="text-box" id="text"></div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>

const slider = document.getElementById("slider");
const text = document.getElementById("text");
const gear = document.getElementById("gear");
const tooltip = document.getElementById("tooltip");
const flow = document.getElementById("flow");

function showTooltip(event, content) {
    tooltip.innerHTML = content;

    const rect = event.target.getBoundingClientRect();
    tooltip.style.left = rect.left + "px";
    tooltip.style.top = (rect.bottom + window.scrollY + 10) + "px";

    tooltip.classList.add("show");
}

document.addEventListener("click", (e) => {
    if (!e.target.matches("a")) tooltip.classList.remove("show");
});

function updateContent() {

    text.classList.remove("active");

    setTimeout(() => {

        if (slider.value == 0) {
            gear.style.transform = "rotate(-100deg)";
            flow.classList.add("active");

            text.innerHTML = `
            <span class="icon"></span>
            Netflix ha profundizado su integración vertical hacia atrás al desarrollar internamente una parte significativa de su contenido (<i>Originals</i>). Esta decisión le permite reducir su dependencia de estudios externos y asegurar un flujo constante de producciones alineadas con su estrategia y preferencias de audiencia.
            Desde el punto de vista económico, esta integración disminuye los <a onclick="showTooltip(event,'Costos de usar el mercado: buscar proveedores, negociar acuerdos y supervisarlos.')">costos de transacción</a>, al evitar procesos complejos de negociación y supervisión con terceros. Además, reduce el <a onclick="showTooltip(event,'Riesgo de que otros actúen en su propio beneficio dentro de un acuerdo.')">riesgo de oportunismo</a>, especialmente relevante cuando existen inversiones específicas o relaciones contractuales prolongadas.
            En este contexto, la producción interna no solo responde a una decisión creativa, sino también a una lógica de eficiencia y control en un entorno donde el contenido es un activo estratégico clave.
            `;
        } 
        else if (slider.value == 1) {
            gear.style.transform = "rotate(0deg)";
            flow.classList.remove("active");

            text.innerHTML = `
            Desliza hacia la izquierda o derecha para explorar cómo Netflix integra distintas etapas de su cadena de valor. Este movimiento refleja el equilibrio entre operar en el mercado y organizar internamente sus actividades. 
            `;
        }
        else {
            gear.style.transform = "rotate(100deg)";
            flow.classList.add("active");

            text.innerHTML = `
            <span class="icon"></span>
            De manera complementaria, Netflix ha avanzado en integración vertical hacia adelante al controlar directamente la distribución de su contenido a través de su infraestructura tecnológica (<i>Open Connect CDN</i>). Esto le permite gestionar de forma más eficiente la entrega del servicio y asegurar una experiencia de usuario consistente a nivel global.
            Desde la perspectiva organizacional, esta decisión reduce los <a onclick="showTooltip(event,'Costos de organizar y gestionar actividades dentro de la empresa.')">costos de coordinación</a>, al centralizar procesos clave y evitar depender de intermediarios en la entrega del contenido. Asimismo, facilita un mayor control sobre variables críticas como la calidad del streaming y la estabilidad del servicio.
            En este caso, la integración hacia adelante refleja una estrategia orientada a optimizar la operación y fortalecer la capacidad de la empresa para adaptarse a la demanda en tiempo real. 
            `;
        }
        text.classList.add("active");
    }, 150);
}

slider.addEventListener("input", updateContent);
updateContent();

</script>

</body>
</html>
