<head>
<!-- ====== CONFIGURACIÓN BÁSICA ====== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Hace que la página sea responsive (se adapta a celulares y pantallas pequeñas) -->
<title>Integración Vertical - Netflix</title><!-- Título que aparece en la pestaña del navegador -->
<style>
/* ====== ESTILO GENERAL ====== */
body {
    margin: 0; /* elimina márgenes por defecto */
    font-family: 'Inter', sans-serif; /* tipografía */
    background: radial-gradient(circle at top, #1a1a1a, #000);/* fondo degradado tipo Netflix */
    color: white; /* texto blanco */
    text-align: center; /* centra el contenido */
}
/* TÍTULO PRINCIPAL */
h1 {
    margin-top: 40px;
    font-size: 2.6em;
    font-weight: 800; /* más grueso */
}
/* ====== CONTENEDOR GENERAL ====== */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;/* organiza los elementos en columna y centrados */
}
/* ====== ENGRANAJE ====== */
.gear-container {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 30px 0;
}
/* CÍRCULO PRINCIPAL */
.gear {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, #2a2a2a 40%, #111 41%);/* efecto de profundidad */
    transition: transform 0.6s ease;/* animación suave al girar */
    box-shadow: 0 0 40px rgba(229,9,20,0.3);
}
/* DIENTES DEL ENGRANAJE */
.gear::before {
    content: "";
    position: absolute;
    width: 310px;
    height: 310px;
    top: -25px;
    left: -25px;
    background: repeating-conic-gradient(#444 0deg 12deg, #111 12deg 24deg);/* crea patrón circular tipo engranaje */
    border-radius: 50%;
    z-index: -1; /* queda detrás */
}
/* ====== LOGO NETFLIX ====== */
.netflix-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 5em;
    font-weight: 900;
    color: #E50914;
}
/* ====== FLUJO (PRODUCCIÓN → DISTRIBUCIÓN) ====== */
.flow {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
    opacity: 0.6;
    transition: opacity 0.4s;
}
.flow.active {
    opacity: 1; /* se ilumina cuando está activo */
}
/* ETAPAS */
.step {
    padding: 8px 14px;
    border-radius: 20px;
    background: #222;
    font-size: 0.9em;
}
/* ====== SLIDER ====== */
.slider-container {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-top: 15px;
}
/* TEXTO DE LOS EXTREMOS */
.label {
    font-size: 0.8em;
    opacity: 0.7;
}
/* BARRA */
input[type="range"] {
    -webkit-appearance: none;
    width: 360px;
    height: 10px;
    background: linear-gradient(90deg, #444, #E50914, #444);
    border-radius: 20px;
}
/* BOTÓN DEL SLIDER */
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: #E50914;
    border-radius: 50%;
    cursor: pointer;
}
/* ====== TEXTO DINÁMICO ====== */
.text-box {
    max-width: 700px;
    margin-top: 25px;
    font-size: 1.1em;
    line-height: 1.6;
    opacity: 0; /* oculto al inicio */
    transform: translateY(10px);
    transition: all 0.4s ease;
}
/* CUANDO APARECE */
.text-box.active {
    opacity: 1;
    transform: translateY(0);
}
/* LINKS INTERACTIVOS */
a {
    color: #4FC3F7;
    border-bottom: 1px dashed #4FC3F7;
    cursor: pointer;
}
/* ====== CUADRO PEQUEÑO ====== */
.tooltip {
    position: absolute;
    background: rgba(20,20,20,0.95);
    padding: 12px;
    border-radius: 10px;
    max-width: 280px;
    display: none;
    opacity: 0;
    transition: all 0.25s;
}
/* TRIÁNGULO DEL TOOLTIP */
.tooltip::after {
    content: "";
    position: absolute;
    top: -8px;
    left: 20px;
    border: 8px solid transparent;
    border-bottom-color: rgba(20,20,20,0.95);
}
/* CUANDO SE MUESTRA */
.tooltip.show {
    display: block;
    opacity: 1;
}
/* ICONOS */
.icon {
    font-size: 1.2em;
    margin-right: 5px;
}
</style>
</head>
<body>
<h1>Integración Vertical</h1>
<div class="container">

    <div class="gear-container">
        <div class="gear" id="gear">
            <div class="netflix-logo">N</div>
        </div>
    </div>

    <div class="flow" id="flow">
        <div class="step"> Producción</div>
        <div class="step"> Distribución</div>
    </div>

    <div class="slider-container">
        <div class="label">Hacia Atrás</div>
        <input type="range" min="0" max="2" step="1" value="1" id="slider">
        <div class="label">Hacia Adelante </div>
    </div>

    <div class="text-box" id="text"></div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>

const slider = document.getElementById("slider");
const text = document.getElementById("text");
const gear = document.getElementById("gear");
const tooltip = document.getElementById("tooltip");
const flow = document.getElementById("flow");

function showTooltip(event, content) {
    tooltip.innerHTML = content;

    const rect = event.target.getBoundingClientRect();
    tooltip.style.left = rect.left + "px";
    tooltip.style.top = (rect.bottom + window.scrollY + 10) + "px";

    tooltip.classList.add("show");
}

document.addEventListener("click", (e) => {
    if (!e.target.matches("a")) tooltip.classList.remove("show");
});

function updateContent() {

    text.classList.remove("active");

    setTimeout(() => {

        if (slider.value == 0) {
            gear.style.transform = "rotate(-100deg)";
            flow.classList.add("active");

            text.innerHTML = `
            <span class="icon"></span>
          
            `;
        } 
        else if (slider.value == 1) {
            gear.style.transform = "rotate(0deg)";
            flow.classList.remove("active");

            text.innerHTML = `
           
            `;
        }
        else {
            gear.style.transform = "rotate(100deg)";
            flow.classList.add("active");

            text.innerHTML = `
            <span class="icon"></span>
            
            `;
        }

        text.classList.add("active");

    }, 150);
}

slider.addEventListener("input", updateContent);
updateContent();

</script>

</body>
</html>
